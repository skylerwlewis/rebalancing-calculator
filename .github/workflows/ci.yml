name: CI

on:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: mkdir -p test-results

      - run: npm test -- --run --reporter=verbose --reporter=json --outputFile=test-results/vitest-results.json

      - name: Report unit test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = 0, failed = 0, skipped = 0, total = 0;
            if (fs.existsSync('test-results/vitest-results.json')) {
              const r = JSON.parse(fs.readFileSync('test-results/vitest-results.json', 'utf8'));
              passed = r.numPassedTests;
              failed = r.numFailedTests;
              skipped = r.numPendingTests;
              total = r.numTotalTests;
            }
            const icon = failed > 0 ? '❌' : '✅';

            await core.summary
              .addHeading(`${icon} Unit Test Results`)
              .addTable([
                [{data: '', header: true}, {data: 'Count', header: true}],
                [{data: '✅ Passed'}, {data: String(passed)}],
                [{data: '❌ Failed'}, {data: String(failed)}],
                [{data: '⏭️ Skipped'}, {data: String(skipped)}],
                [{data: 'Total'}, {data: String(total)}],
              ])
              .write();

            const marker = '<!-- vitest-test-results -->';
            const body = [
              marker,
              `## ${icon} Unit Test Results`,
              '',
              '| | Count |',
              '|---|---|',
              `| ✅ Passed | ${passed} |`,
              `| ❌ Failed | ${failed} |`,
              `| ⏭️ Skipped | ${skipped} |`,
              `| **Total** | **${total}** |`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Install Chromium and its Linux system dependencies.
      # --with-deps handles apt packages (libglib2.0, libnss3, etc.) so the
      # headless shell can run on a clean Ubuntu runner.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: mkdir -p test-results

      - run: npm run test:e2e

      - name: Report E2E test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = 0, failed = 0, flaky = 0, skipped = 0, total = 0;
            if (fs.existsSync('test-results/playwright-results.json')) {
              const r = JSON.parse(fs.readFileSync('test-results/playwright-results.json', 'utf8'));
              passed = r.stats?.expected ?? 0;
              failed = r.stats?.unexpected ?? 0;
              flaky = r.stats?.flaky ?? 0;
              skipped = r.stats?.skipped ?? 0;
              total = passed + failed + flaky + skipped;
            }
            const icon = failed > 0 ? '❌' : '✅';

            await core.summary
              .addHeading(`${icon} E2E Test Results`)
              .addTable([
                [{data: '', header: true}, {data: 'Count', header: true}],
                [{data: '✅ Passed'}, {data: String(passed)}],
                [{data: '❌ Failed'}, {data: String(failed)}],
                [{data: '🔁 Flaky'}, {data: String(flaky)}],
                [{data: '⏭️ Skipped'}, {data: String(skipped)}],
                [{data: 'Total'}, {data: String(total)}],
              ])
              .write();

            const marker = '<!-- playwright-test-results -->';
            const body = [
              marker,
              `## ${icon} E2E Test Results`,
              '',
              '| | Count |',
              '|---|---|',
              `| ✅ Passed | ${passed} |`,
              `| ❌ Failed | ${failed} |`,
              `| 🔁 Flaky | ${flaky} |`,
              `| ⏭️ Skipped | ${skipped} |`,
              `| **Total** | **${total}** |`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

      # Upload the HTML report as an artifact so you can inspect failures
      # without re-running the workflow.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
