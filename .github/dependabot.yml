version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      emotion:
        patterns:
          - "@emotion/*"
      mui:
        patterns:
          - "@mui/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "globals"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      cloudflare:
        patterns:
          - "@cloudflare/*"
